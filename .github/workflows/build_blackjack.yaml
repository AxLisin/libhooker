name: Build libblackjack

on:
  push:
    branches: [ master, main ]
    paths:
      - 'libblackjack/**'
      - 'libhooker/as-aarch64/**'
      - 'libhooker/include/**'
      - 'Makefile'
      - '.github/workflows/build-libblackjack.yml'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build libblackjack.dylib (iOS 26.5)
    runs-on: macos-latest   # Xcode 26 is pre-installed here

    steps:
      # ── 1. Checkout your fork ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Print Xcode / SDK info for debugging ──────────────────────────
      - name: Show available Xcode SDKs
        run: xcodebuild -showsdks

      # ── 3. Locate the iOS 26 SDK bundled with Xcode ──────────────────────
      # GitHub's macos-latest runner ships with Xcode 26 which includes the
      # iPhoneOS26.sdk. We expose its path so Theos can find it.
      - name: Locate iOS 26 SDK
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || true)
          SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version 2>/dev/null || true)
          echo "Detected SDK: $SDK_VER at $SDK_PATH"
          echo "XCODE_SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
          echo "XCODE_SDK_VER=$SDK_VER" >> $GITHUB_ENV

      # ── 4. Install Theos ─────────────────────────────────────────────────
      - name: Set up Theos
        run: |
          export THEOS=~/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          git clone --recursive https://github.com/theos/theos.git $THEOS

      # ── 5. Wire the Xcode SDK into Theos ─────────────────────────────────
      # Theos looks for SDKs under $THEOS/sdks/iPhoneOS<ver>.sdk.
      # We symlink the Xcode-bundled SDK so Theos resolves TARGET correctly.
      - name: Link iOS SDK into Theos
        run: |
          SDK_NAME="iPhoneOS${XCODE_SDK_VER}.sdk"
          mkdir -p $THEOS/sdks
          ln -sf "$XCODE_SDK_PATH" "$THEOS/sdks/$SDK_NAME"
          echo "Linked $XCODE_SDK_PATH -> $THEOS/sdks/$SDK_NAME"
          ls $THEOS/sdks/

      # ── 6. Install llvm/clang toolchain (arm64/arm64e cross-compiler) ────
      # The Xcode clang on macOS runners can target arm64/arm64e already.
      # No extra toolchain install needed for Darwin targets.
      - name: Verify clang target support
        run: clang -arch arm64 -arch arm64e -v 2>&1 | head -5

      # ── 7. Build libblackjack ─────────────────────────────────────────────
      # Targets iOS 26.0 as the minimum (covers 26.5 and later).
      # libblackjack depends on libhooker at link time, so we build both;
      # only libblackjack.dylib will be uploaded as the artifact.
      - name: Build libblackjack
        run: |
          export THEOS=~/theos
          make \
            ARCHS="arm64 arm64e" \
            TARGET="iphone:${XCODE_SDK_VER}:26.0" \
            -j$(sysctl -n hw.logicalcpu)

      # ── 8. Locate the built dylib ─────────────────────────────────────────
      - name: Locate output dylib
        run: |
          find . -name "libblackjack.dylib" | tee /tmp/dylib_paths.txt
          DYLIB=$(head -1 /tmp/dylib_paths.txt)
          echo "DYLIB_PATH=$DYLIB" >> $GITHUB_ENV
          # Print binary info for confirmation
          file "$DYLIB"
          otool -l "$DYLIB" | grep -A3 'LC_VERSION_MIN\|LC_BUILD_VERSION' || true

      # ── 9. Upload artifact ────────────────────────────────────────────────
      - name: Upload libblackjack.dylib
        uses: actions/upload-artifact@v4
        with:
          name: libblackjack-ios26-dylib
          path: ${{ env.DYLIB_PATH }}
          if-no-files-found: error
          retention-days: 30

      # ── 10. (Optional) Create a GitHub Release on version tags ────────────
      # Tag your commit like `v1.0.0` to trigger an automatic release.
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DYLIB_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
